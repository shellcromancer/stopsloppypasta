name: Deploy Cloudflare Preview

on:
  issue_comment:
    types:
      - created

jobs:
  authorize:
    if: >-
      github.event.issue.pull_request
      && startsWith(github.event.comment.body, '/deploy-preview')
    runs-on: ubuntu-latest
    name: Authorize Preview Deploy
    permissions:
      contents: read
      pull-requests: read
    outputs:
      allowed: ${{ steps.authorize.outputs.allowed }}
      pr_number: ${{ steps.authorize.outputs.pr_number }}
      head_sha: ${{ steps.authorize.outputs.head_sha }}
      head_repo: ${{ steps.authorize.outputs.head_repo }}
    steps:
      - name: Validate commenter and resolve PR head
        id: authorize
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.issue.number;
            const permissionResponse = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: context.actor,
            });
            const allowed = ['admin', 'maintain', 'write'].includes(permissionResponse.data.permission);
            core.setOutput('allowed', String(allowed));

            if (!allowed) {
              core.notice(`Ignoring preview deploy request from ${context.actor} with permission ${permissionResponse.data.permission}.`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issueNumber,
            });

            if (pr.state !== 'open') {
              core.setFailed(`Pull request #${issueNumber} is not open.`);
              return;
            }

            if (!pr.head.repo) {
              core.setFailed(`Pull request #${issueNumber} head repository is unavailable. The fork may have been deleted.`);
              return;
            }

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_repo', pr.head.repo.full_name);

  deploy:
    if: needs.authorize.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    name: Deploy Preview
    needs:
      - authorize
    concurrency:
      group: preview-pr-${{ needs.authorize.outputs.pr_number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write
      pull-requests: write
      deployments: write
      statuses: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.authorize.outputs.head_repo }}
          ref: ${{ needs.authorize.outputs.head_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy preview
        id: deploy-preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.74.0"
          command: >-
            pages deploy _site --project-name=stopsloppypasta
            --branch=pr-${{ needs.authorize.outputs.pr_number }}

      - name: Find or create preview comment
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy-preview.outputs.deployment-url }}
          DEPLOYMENT_ALIAS_URL: ${{ steps.deploy-preview.outputs.pages-deployment-alias-url }}
        with:
          script: |
            const marker = '<!-- cloudflare-preview -->';
            const issueNumber = Number('${{ needs.authorize.outputs.pr_number }}');
            const previewUrl = process.env.DEPLOYMENT_ALIAS_URL || process.env.DEPLOYMENT_URL;

            if (!previewUrl) {
              core.setFailed('Wrangler action did not provide a deployment URL.');
              return;
            }

            const body = `${marker}\nPreview deployed to: ${previewUrl}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const existing = comments.find((comment) => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }

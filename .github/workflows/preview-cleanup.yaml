name: Cleanup Cloudflare Preview

on:
  pull_request:
    types:
      - closed

jobs:
  cleanup:
    runs-on: ubuntu-latest
    name: Cleanup Preview Deployments
    permissions:
      contents: read
    steps:
      - name: Delete preview deployments for closed PR
        uses: actions/github-script@v7
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: stopsloppypasta
        with:
          script: |
            const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
            const apiToken = process.env.CLOUDFLARE_API_TOKEN;
            const projectName = process.env.PROJECT_NAME;
            const targetBranch = `pr-${context.payload.pull_request.number}`;

            if (!accountId || !apiToken) {
              core.setFailed('Missing Cloudflare credentials.');
              return;
            }

            const baseUrl = `https://api.cloudflare.com/client/v4/accounts/${accountId}/pages/projects/${projectName}/deployments`;
            const defaultHeaders = {
              Authorization: `Bearer ${apiToken}`,
              'Content-Type': 'application/json;charset=UTF-8',
            };

            async function request(url, init = {}) {
              const response = await fetch(url, {
                ...init,
                headers: {
                  ...defaultHeaders,
                  ...(init.headers ?? {}),
                },
              });

              let payload = null;
              try {
                payload = await response.json();
              } catch {
                payload = null;
              }

              return {
                ok: response.ok && payload?.success !== false,
                status: response.status,
                payload,
              };
            }

            const deployments = [];

            for (let page = 1; ; page += 1) {
              const response = await request(`${baseUrl}?env=preview&page=${page}&per_page=100`);

              if (!response.ok) {
                core.setFailed(`Failed to list preview deployments: ${JSON.stringify(response.payload)}`);
                return;
              }

              const batch = Array.isArray(response.payload?.result) ? response.payload.result : [];
              deployments.push(...batch);

              const totalPages = response.payload?.result_info?.total_pages;
              if (!totalPages || page >= totalPages || batch.length === 0) {
                break;
              }
            }

            const matchingDeployments = deployments
              .filter((deployment) => {
                const aliases = Array.isArray(deployment.aliases) ? deployment.aliases : [];
                const aliasMatch = aliases.some((alias) =>
                  String(alias).toLowerCase().includes(targetBranch),
                );
                const metadataBranch = deployment?.deployment_trigger?.metadata?.branch;
                return aliasMatch || metadataBranch === targetBranch;
              })
              .sort((left, right) => {
                const leftDate = Date.parse(left.created_on ?? '') || 0;
                const rightDate = Date.parse(right.created_on ?? '') || 0;
                return leftDate - rightDate;
              });

            if (matchingDeployments.length === 0) {
              core.notice(`No preview deployments found for ${targetBranch}.`);
              return;
            }

            let deletedCount = 0;
            let failedCount = 0;

            for (const deployment of matchingDeployments) {
              const response = await request(`${baseUrl}/${deployment.id}`, {
                method: 'DELETE',
              });

              if (response.ok) {
                deletedCount += 1;
                continue;
              }

              failedCount += 1;
              core.warning(
                `Failed to delete deployment ${deployment.id}: ${JSON.stringify(response.payload)}`,
              );
            }

            core.notice(
              `Preview cleanup for ${targetBranch}: deleted ${deletedCount} deployment(s), ${failedCount} deletion(s) failed.`,
            );

            if (failedCount > 0) {
              core.notice(
                'Cloudflare may retain the latest deployment for a branch alias even after the PR is closed.',
              );
            }

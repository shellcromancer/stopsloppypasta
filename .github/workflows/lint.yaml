name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run prek on changed files
        uses: j178/prek-action@v1
        with:
          extra-args: >-
            ${{ github.event_name == 'pull_request'
              && format('--from-ref=origin/{0} --to-ref=HEAD', github.base_ref)
              || '--from-ref=HEAD~1 --to-ref=HEAD' }}
